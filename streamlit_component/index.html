<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #f7f5f0;
      overflow: hidden;
    }
    iframe {
      display: block;
      width: 100%;
      height: 1500px;
      border: 0;
      margin: 0;
      padding: 0;
      background: #f7f5f0;
    }
  </style>
</head>
<body>
  <iframe id="ui" title="時間表查詢"></iframe>
  <script>
    const Streamlit = {
      ready() {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:componentReady',
          apiVersion: 1,
        }, '*');
      },
      setFrameHeight(height) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setFrameHeight',
          height,
        }, '*');
      },
      setComponentValue(value) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setComponentValue',
          value,
        }, '*');
      },
    };

    const ui = document.getElementById('ui');
    let lastHtml = '';
    let resizeObserver = null;
    let mutationObserver = null;
    let measureTimer = 0;
    let lastHeight = 0;

    function disconnectObservers() {
      if (resizeObserver) {
        resizeObserver.disconnect();
        resizeObserver = null;
      }
      if (mutationObserver) {
        mutationObserver.disconnect();
        mutationObserver = null;
      }
    }

    function measureHeight() {
      const doc = ui.contentDocument;
      if (!doc || !doc.body) return;
      const body = doc.body;
      const root = doc.documentElement;
      const height = Math.ceil(Math.max(
        body.scrollHeight,
        root ? root.scrollHeight : 0,
        body.offsetHeight,
        root ? root.offsetHeight : 0
      ));
      if (!height || height === lastHeight) return;
      lastHeight = height;
      ui.style.height = height + 'px';
      Streamlit.setFrameHeight(height);
    }

    function scheduleMeasure() {
      if (measureTimer) return;
      measureTimer = window.requestAnimationFrame(() => {
        measureTimer = 0;
        measureHeight();
      });
    }

    function attachObservers() {
      disconnectObservers();
      scheduleMeasure();
      const doc = ui.contentDocument;
      if (!doc || !doc.body) return;

      if (window.ResizeObserver) {
        resizeObserver = new ResizeObserver(scheduleMeasure);
        resizeObserver.observe(doc.body);
        if (doc.documentElement) {
          resizeObserver.observe(doc.documentElement);
        }
      }
      if (window.MutationObserver) {
        mutationObserver = new MutationObserver(scheduleMeasure);
        mutationObserver.observe(doc.body, {
          childList: true,
          subtree: true,
          characterData: true,
          attributes: true,
        });
      }
    }

    function render(args) {
      const html = (args && args.html) || '';
      const height = Number((args && args.height) || 1500);
      if (height && height !== ui.height) {
        ui.style.height = height + 'px';
      }
      if (html && html !== lastHtml) {
        lastHtml = html;
        ui.srcdoc = html;
      }
    }

    window.addEventListener('message', event => {
      const data = event.data || {};
      if (data.type === 'streamlit:render') {
        render(data.args || {});
        return;
      }
      if (data.type === 'timetable-ai-request') {
        Streamlit.setComponentValue({
          type: 'timetable-ai-request',
          question: data.question || '',
          anchorDate: data.anchorDate || '',
          requestId: data.requestId || String(Date.now()),
        });
      }
    });

    ui.addEventListener('load', attachObservers);
    window.addEventListener('resize', scheduleMeasure);

    Streamlit.ready();
    Streamlit.setFrameHeight(1500);
  </script>
</body>
</html>
